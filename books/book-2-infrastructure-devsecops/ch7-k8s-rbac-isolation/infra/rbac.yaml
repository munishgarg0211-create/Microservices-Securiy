# Least Privilege RBAC for a Microservice
apiVersion: v1
kind: Namespace
metadata:
  name: payment-ns
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-sa
  namespace: payment-ns
# BETTER: Disable API token mount if pod doesn't need to talk to K8s API
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: payment-ns
  name: config-reader
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"] # No 'secrets', no 'pods' - strictly scoped
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-configs-binding
  namespace: payment-ns
subjects:
- kind: ServiceAccount
  name: payment-sa
  namespace: payment-ns
roleRef:
  kind: Role
  name: config-reader
  apiGroup: rbac.authorization.k8s.io
