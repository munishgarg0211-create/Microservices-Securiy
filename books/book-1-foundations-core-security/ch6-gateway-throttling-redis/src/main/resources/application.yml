spring:
  application:
    name: ch6-gateway-throttling-redis
  cloud:
    gateway:
      routes:
        - id: demo_route
          uri: http://localhost:8080
          predicates:
            - Path=/api/demo/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
